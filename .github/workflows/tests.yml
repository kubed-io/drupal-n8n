name: 🧪 Tests

# The fast loop: PHPUnit Unit + Kernel. No network, no n8n, no browser.
#
# A Drupal module cannot be tested standalone — PHPUnit needs core's bootstrap and
# the site's autoloader. So we build a throwaway Drupal, drop this module in as a
# composer PATH repository, and run the module's own phpunit.xml.dist from the
# Drupal root. That is the same shape the Drupal GitLab CI templates use, minus
# GitLab.
#
# Functional / FunctionalJavascript are deliberately absent — Behat owns that
# layer (integration.yml). See CONTRIBUTING.md "Testing".

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

permissions:
  contents: read
  # Test results → sticky PR comment + check run.
  checks: write
  pull-requests: write

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# Static values live here so `run:` steps are pure bash reading $VARS — never
# inline GitHub templating. See CONTRIBUTING.md "Workflow authoring conventions".
env:
  MODULE: n8n
  DRUPAL_DIR: /tmp/drupal

jobs:

  phpunit:
    # The job name becomes the check context that branch protection requires, so it
    # is set explicitly — a bare `name: PHPUnit` under a matrix would render as
    # "PHPUnit (^11, 8.3)" and make the ruleset brittle.
    name: PHPUnit PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # A PR runs ONLY the production PHP: fast feedback, and one test-result
        # comment instead of one per version. The full sweep — 8.3, our stated
        # floor, through 8.5, what the pod actually runs — happens on merge to
        # main, where latency blocks nobody.
        #
        # Consequence, and it matters: "PHPUnit PHP 8.3" never reports on a PR, so
        # it must NOT be a required status check or every PR would hang waiting
        # for it. Only "PHPUnit PHP 8.5" is required.
        php: ${{ fromJSON(github.event_name == 'pull_request' && '["8.5"]' || '["8.3","8.5"]') }}

    steps:
    # ── Provision: everything installed up front, before any work happens ─────
    - name: Checkout module
      uses: actions/checkout@v7
      with:
        path: module

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mbstring, gd, pdo_sqlite, sqlite3, dom, curl, xml
        coverage: none
        tools: composer:v2

    # working-directory cannot be used here: the directory does not exist until this
    # step creates it. Everything after runs with working-directory instead of cd.
    - name: Create a throwaway Drupal
      run: |
        composer create-project 'drupal/recommended-project:^11' "$DRUPAL_DIR" \
          --no-interaction --no-progress --no-install

    - name: Configure composer
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        composer config --no-plugins allow-plugins.composer/installers true
        composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true
        composer config --no-plugins allow-plugins.drupal/core-project-message true
        composer config --no-plugins allow-plugins.phpstan/extension-installer true
        composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
        composer config minimum-stability dev
        composer config prefer-stable true

    # The module under test is wired in as a path repo, so composer installs the
    # working tree rather than a published release.
    - name: Require the module from the working tree
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        # symlink:false so the module is COPIED to web/modules/contrib/n8n.
        # With a symlink, relative paths in phpunit.xml.dist resolve against
        # the working tree and cannot find core.
        composer config repositories.module '{"type":"path","url":"'"$GITHUB_WORKSPACE"'/module","options":{"symlink":false}}'
        composer require "drupal/$MODULE:*" drupal/ai drupal/key \
          --no-interaction --no-progress
        # PIN core-dev to the core major. Unconstrained, composer silently
        # backtracks to drupal/core-dev 8.0.0-beta15 — a Drupal 8-era metapackage
        # with no dependencies — and you get a green install with no phpunit and a
        # baffling "./vendor/bin/phpunit: No such file or directory".
        composer require --dev "drupal/core-dev:^11" -W \
          --no-interaction --no-progress

    # composer installed the module exactly as a site gets it — which, thanks to
    # .gitattributes export-ignore, has no tests, no phpunit.xml.dist and no
    # quality configs in it. That is the point of the package; it is also useless
    # to test. Copy the dev-only files back over the installed copy so we test the
    # SHIPPED tree plus the suites that prove it. "Package is clean" is asserted
    # separately, by the archive check.
    - name: Restore the dev-only files over the installed package
      run: |
        dest="$DRUPAL_DIR/web/modules/contrib/$MODULE"
        for p in tests features phpunit.xml.dist phpcs.xml.dist phpstan.neon; do
          [ -e "$GITHUB_WORKSPACE/module/$p" ] && cp -r "$GITHUB_WORKSPACE/module/$p" "$dest/"
        done
        # Submodule suites are export-ignored too.
        for d in "$GITHUB_WORKSPACE"/module/modules/*/tests; do
          [ -d "$d" ] || continue
          m=$(basename "$(dirname "$d")")
          cp -r "$d" "$dest/modules/$m/"
        done
        test -f "$dest/phpunit.xml.dist" || { echo "::error::restore failed"; exit 1; }

    # Fail here, loudly, rather than 20 lines later with exit 127.
    - name: Verify the test harness installed
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        if [ ! -x ./vendor/bin/phpunit ]; then
          echo "::error::phpunit was not installed — check the drupal/core-dev constraint"
          composer show drupal/core-dev || true
          exit 1
        fi
        ./vendor/bin/phpunit --version

    # ── Act: everything is provisioned; now run the suite ────────────────────
    - name: Run PHPUnit
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        ./vendor/bin/phpunit \
          -c "web/modules/contrib/$MODULE/phpunit.xml.dist" \
          --log-junit "$GITHUB_WORKSPACE/junit.xml" \
          --testdox

    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        check_name: PHPUnit results PHP ${{ matrix.php }}
        files: junit.xml
        comment_mode: always
