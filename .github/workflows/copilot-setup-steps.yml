name: Copilot Setup Steps

# Pre-warms the environment GitHub Copilot's coding agent gets when it works in
# this repo. The job name `copilot-setup-steps` is what Copilot looks for — do not
# rename it.
#
# A Drupal module cannot be installed standalone: `composer install` on this
# manifest alone resolves nothing useful, because drupal/* comes from drupal.org's
# facade and the module only makes sense inside a site. So this mirrors what CI
# actually does — build a throwaway Drupal and drop the module in as a path repo —
# which gives the agent a tree where `\Drupal::` and `Drupal\ai\*` resolve, and
# phpunit/phpcs/phpstan are real binaries rather than guesses.
#
# No Node step, deliberately: this module ships zero JavaScript.

on:
  workflow_dispatch:
  push:
    paths:
    - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
    - .github/workflows/copilot-setup-steps.yml

env:
  MODULE: n8n
  DRUPAL_DIR: /tmp/drupal

jobs:

  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout module
      uses: actions/checkout@v7
      with:
        path: module

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        # Match the production pod — verified: PHP 8.5.8, Drupal 11.4.2.
        php-version: '8.5'
        extensions: mbstring, gd, pdo_sqlite, sqlite3, dom, curl, xml
        coverage: none
        tools: composer:v2

    # working-directory cannot be used here: the directory does not exist until this
    # step creates it. Everything after runs with working-directory instead of cd.
    - name: Create a throwaway Drupal
      run: |
        composer create-project 'drupal/recommended-project:^11' "$DRUPAL_DIR" \
          --no-interaction --no-progress --no-install

    - name: Configure composer
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        composer config --no-plugins allow-plugins.composer/installers true
        composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true
        composer config --no-plugins allow-plugins.drupal/core-project-message true
        composer config --no-plugins allow-plugins.phpstan/extension-installer true
        composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
        composer config minimum-stability dev
        composer config prefer-stable true
        composer config repositories.module path "$GITHUB_WORKSPACE/module"
        composer require "drupal/$MODULE:*" drupal/ai drupal/key drush/drush \
          --no-interaction --no-progress
        composer require --dev "drupal/core-dev:^11" -W \
          --no-interaction --no-progress
        composer require --dev drupal/coder mglaman/phpstan-drupal \
          phpstan/phpstan-deprecation-rules phpstan/extension-installer \
          jbelien/phpstan-sarif-formatter \
          --no-interaction --no-progress

    - name: Install Behat deps
      working-directory: module/tests/integration
      run: composer install --prefer-dist --no-progress

    - name: Verify the toolchain resolves
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        ./vendor/bin/phpunit --version
        ./vendor/bin/phpcs --version
        ./vendor/bin/phpstan --version
        ./vendor/bin/drush --version
