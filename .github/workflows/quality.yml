name: 🛡️ Quality

# The slower gates, kept out of the fast test loop: dependency audit, Drupal's
# coding standard, and static analysis.
#
# Why PHPStan and not Psalm: PHPStan is the Drupal ecosystem's analyser —
# drupal/ai and ai_provider_openai both ship a phpstan.neon, and
# mglaman/phpstan-drupal teaches it the container, entities and hooks. Our sibling
# nextcloud-n8n uses Psalm because that is the Nextcloud norm. The platform picks
# the tool, same as it picks the licence.
#
# CodeQL does not analyse PHP — it is the only top-10 language it skips — so PHPStan
# IS our code scanner, exactly as Psalm is in the sibling project. It emits SARIF
# (via jbelien/phpstan-sarif-formatter, since phpstan#5973 is still open) which we
# upload to code scanning; GitHub renders both the Security-tab alerts and the
# inline PR annotations from that single upload.

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

permissions:
  contents: read
  # Upload the PHPStan SARIF to Security → Code scanning.
  security-events: write

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE: n8n
  DRUPAL_DIR: /tmp/drupal

jobs:

  quality:
    name: PHP Quality
    runs-on: ubuntu-latest
    steps:
    # ── Provision ────────────────────────────────────────────────────────────
    - name: Checkout module
      uses: actions/checkout@v7
      with:
        path: module

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        # Match the production pod — verified: PHP 8.5.8, Drupal 11.4.2.
        php-version: '8.5'
        coverage: none
        tools: composer:v2

    # PHPCS and PHPStan both need Drupal on disk: the coder standard resolves
    # against core, and phpstan-drupal boots the container to know what \Drupal::
    # returns. So we build the same throwaway site tests.yml does.
    - name: Build a throwaway Drupal
      run: |
        composer create-project 'drupal/recommended-project:^11' "$DRUPAL_DIR" \
          --no-interaction --no-progress --no-install
        cd "$DRUPAL_DIR"
        composer config --no-plugins allow-plugins.composer/installers true
        composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true
        composer config --no-plugins allow-plugins.drupal/core-project-message true
        composer config --no-plugins allow-plugins.phpstan/extension-installer true
        composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
        composer config minimum-stability dev
        composer config prefer-stable true
        # symlink:false so the module is COPIED to web/modules/contrib/n8n.
        # With a symlink, relative paths in phpunit.xml.dist resolve against
        # the working tree and cannot find core.
        composer config repositories.module '{"type":"path","url":"'"$GITHUB_WORKSPACE"'/module","options":{"symlink":false}}'
        # drush is needed at ANALYSIS time, not just runtime: without it PHPStan
        # reads src/Drush/Commands as "extends unknown class" and "attribute class
        # Drush\Attributes\Command does not exist" — the analyser is not wrong, it
        # is under-equipped. Same failure mode as core-dev missing.
        composer require "drupal/$MODULE:*" drupal/ai drupal/key drush/drush \
          --no-interaction --no-progress
        # core-dev brings PHPUnit. Without it PHPStan analyses tests/ and reports
        # every assertion as an undefined method — noise that buries real findings.
        # Pinned to the core major for the same reason tests.yml pins it: left
        # unconstrained, composer backtracks to the Drupal 8-era 8.0.0-beta15.
        composer require --dev "drupal/core-dev:^11" -W \
          --no-interaction --no-progress
        composer require --dev drupal/coder mglaman/phpstan-drupal \
          phpstan/phpstan-deprecation-rules phpstan/extension-installer \
          jbelien/phpstan-sarif-formatter \
          --no-interaction --no-progress

    # ── Act ──────────────────────────────────────────────────────────────────
    # Audit from the Drupal root, not the module. A Drupal contrib module ships no
    # composer.lock by design — the *site* owns dependency resolution — so there is
    # nothing to audit in module/ ("No installed packages found"). The site we just
    # built has a real lock covering our dependencies, and that is the tree an
    # operator actually installs.
    - name: Audit composer dependencies
      run: |
        cd "$DRUPAL_DIR"
        echo "## composer audit" >> "$GITHUB_STEP_SUMMARY"
        if composer audit --format=plain --locked | tee audit.txt; then
          echo "✅ No advisories" >> "$GITHUB_STEP_SUMMARY"
        else
          status=$?
          { echo '```'; tail -40 audit.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          exit $status
        fi

    # NOTE: this step records its result instead of failing, so PHPStan still runs
    # and still reports. Letting phpcs stop the job meant one gate's failure hid
    # the other's findings — you fixed phpcs, re-ran, and only then learned what
    # PHPStan thought. Both gates report every run; "Gate" at the end fails the job.
    #
    # Errors gate; warnings are reported but do not fail (ignore_warnings_on_exit).
    # The standing warning is Drupal.Files.LineLength.TooLong — this repo's comments
    # explain *why* code is the way it is and run past 80 characters. Declared debt,
    # not a licence: wrap new comments at 80. See phpcs.xml.dist.
    - name: Coding standard (Drupal + DrupalPractice)
      id: phpcs
      run: |
        cd "$DRUPAL_DIR"
        if ./vendor/bin/phpcs \
          --standard="web/modules/contrib/$MODULE/phpcs.xml.dist" \
          --report=full \
          --report-summary \
          --runtime-set ignore_warnings_on_exit 1; then
          echo "✅ Coding standard clean" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "failed=true" >> "$GITHUB_OUTPUT"
          echo "## Coding standard found errors" >> "$GITHUB_STEP_SUMMARY"
          echo "See the step log above." >> "$GITHUB_STEP_SUMMARY"
        fi

    # PHPStan is the code scanner. Emit SARIF rather than annotations: the upload
    # below produces the inline PR annotations *and* the Security-tab alerts, so
    # one run covers both. `|| true` because a findings-exit must still upload —
    # the gate is the next step, which fails on real findings.
    - name: Static analysis (PHPStan)
      id: phpstan
      run: |
        cd "$DRUPAL_DIR"
        ./vendor/bin/phpstan analyse \
          --configuration="web/modules/contrib/$MODULE/phpstan.neon" \
          --error-format=sarif \
          --memory-limit=512M \
          --no-progress > "$GITHUB_WORKSPACE/phpstan.sarif" || echo "found=true" >> "$GITHUB_OUTPUT"

    # Upload even when PHPStan FOUND something — an empty Security tab on a failing
    # run would be worse than useless. But not when PHPStan never RAN: an earlier
    # step failing (phpcs exits 2 on errors, and bash -e stops the job) would
    # otherwise add a second, misleading "Path does not exist: phpstan.sarif" error
    # pointing at the scanner instead of at the real failure.
    - name: Upload PHPStan SARIF to code scanning
      if: always() && hashFiles('phpstan.sarif') != ''
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: phpstan.sarif
        category: phpstan

    # SARIF is machine-readable, which means a failing run says nothing useful in
    # the log. Re-run with a human format so the findings are right here — PHPStan
    # caches, so this costs a second — then fail.
    # SARIF is machine-readable, so a failing run says nothing useful in the log.
    # Re-run with a human format to put the findings in the summary. PHPStan caches,
    # so this costs a second.
    - name: Report PHPStan findings
      if: steps.phpstan.outputs.found == 'true'
      run: |
        cd "$DRUPAL_DIR"
        echo "## PHPStan found issues" >> "$GITHUB_STEP_SUMMARY"
        ./vendor/bin/phpstan analyse \
          --configuration="web/modules/contrib/$MODULE/phpstan.neon" \
          --error-format=table \
          --memory-limit=512M \
          --no-progress | tee /tmp/phpstan.txt || true
        { echo '```'; tail -60 /tmp/phpstan.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
        echo "Also in Security → Code scanning, and inline on the PR." >> "$GITHUB_STEP_SUMMARY"

    # The only step that fails the job. By here every gate has run and reported, so
    # one run tells you everything that is wrong rather than the first thing.
    - name: Gate
      if: steps.phpcs.outputs.failed == 'true' || steps.phpstan.outputs.found == 'true'
      env:
        PHPCS_FAILED: ${{ steps.phpcs.outputs.failed }}
        PHPSTAN_FOUND: ${{ steps.phpstan.outputs.found }}
      run: |
        [ "$PHPCS_FAILED" = "true" ] && echo "::error::Coding standard found errors"
        [ "$PHPSTAN_FOUND" = "true" ] && echo "::error::PHPStan found issues"
        exit 1
