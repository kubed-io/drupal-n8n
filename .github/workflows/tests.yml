name: 🧪 Tests

# The fast loop: PHPUnit Unit + Kernel. No network, no n8n, no browser.
#
# A Drupal module cannot be tested standalone — PHPUnit needs core's bootstrap and
# the site's autoloader. So we build a throwaway Drupal and symlink this module in
# as a composer PATH repository, which means the tests run from SOURCE.
#
# We use CORE's phpunit config rather than shipping our own: its bootstrap is
# relative to core/ and so is correct wherever the module lives. That is the same
# shape the Drupal GitLab CI templates use, minus GitLab.
#
# Functional / FunctionalJavascript are deliberately absent — Behat owns that
# layer (integration.yml). See CONTRIBUTING.md "Testing".

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

permissions:
  contents: read
  # Test results → sticky PR comment + check run.
  checks: write
  pull-requests: write

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# Static values live here so `run:` steps are pure bash reading $VARS — never
# inline GitHub templating. See CONTRIBUTING.md "Workflow authoring conventions".
env:
  MODULE: n8n
  DRUPAL_DIR: /tmp/drupal

jobs:

  phpunit:
    # The job name becomes the check context that branch protection requires, so it
    # is set explicitly — a bare `name: PHPUnit` under a matrix would render as
    # "PHPUnit (^11, 8.3)" and make the ruleset brittle.
    name: PHPUnit PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # A PR runs ONLY the production PHP: fast feedback, and one test-result
        # comment instead of one per version. The full sweep — 8.3, our stated
        # floor, through 8.5, what the pod actually runs — happens on merge to
        # main, where latency blocks nobody.
        #
        # Consequence, and it matters: "PHPUnit PHP 8.3" never reports on a PR, so
        # it must NOT be a required status check or every PR would hang waiting
        # for it. Only "PHPUnit PHP 8.5" is required.
        php: ${{ fromJSON(github.event_name == 'pull_request' && '["8.5"]' || '["8.3","8.5"]') }}

    steps:
    # ── Provision: everything installed up front, before any work happens ─────
    - name: Checkout module
      uses: actions/checkout@v7
      with:
        path: module

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mbstring, gd, pdo_sqlite, sqlite3, dom, curl, xml
        coverage: none
        tools: composer:v2

    # working-directory cannot be used here: the directory does not exist until this
    # step creates it. Everything after runs with working-directory instead of cd.
    - name: Create a throwaway Drupal
      run: |
        composer create-project 'drupal/recommended-project:^11' "$DRUPAL_DIR" \
          --no-interaction --no-progress --no-install

    - name: Configure composer
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        composer config --no-plugins allow-plugins.composer/installers true
        composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true
        composer config --no-plugins allow-plugins.drupal/core-project-message true
        composer config --no-plugins allow-plugins.phpstan/extension-installer true
        composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
        composer config minimum-stability dev
        composer config prefer-stable true

    # The module under test is wired in as a path repo, so composer installs the
    # working tree rather than a published release.
    # A path repo symlinks by default, so web/modules/contrib/n8n becomes the
    # working tree and the suite below runs from SOURCE rather than from a copy.
    #
    # Requiring the module rather than checking it out in place is deliberate: it
    # resolves our transitive dependencies from our own composer.json, and proves
    # the package is installable at all.
    #
    # core-dev is PINNED to the core major. Unconstrained, composer silently
    # backtracks to drupal/core-dev 8.0.0-beta15 — a Drupal 8-era metapackage with
    # no dependencies — and the install goes green with no phpunit, failing later
    # with a baffling "./vendor/bin/phpunit: No such file or directory".
    - name: Require the module from the working tree
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        composer config repositories.module path "$GITHUB_WORKSPACE/module"
        composer require "drupal/$MODULE:*" drupal/ai drupal/key \
          --no-interaction --no-progress
        composer require --dev "drupal/core-dev:^11" -W \
          --no-interaction --no-progress


    # Fails here, loudly, rather than 20 lines later with a bare exit 127.
    - name: Verify the test harness installed
      working-directory: ${{ env.DRUPAL_DIR }}
      run: |
        if [ ! -x ./vendor/bin/phpunit ]; then
          echo "::error::phpunit was not installed — check the drupal/core-dev constraint"
          composer show drupal/core-dev || true
          exit 1
        fi
        ./vendor/bin/phpunit --version

    # ── Act: everything is provisioned; now run the suite ────────────────────
    #
    # Uses CORE's phpunit config — how drupal.org runs contrib — because its
    # bootstrap is tests/bootstrap.php relative to core/, and so is correct
    # wherever the module lives. Shipping our own meant a ../../.. that only
    # resolved in one layout, which is what forced a copy instead of a symlink.
    #
    # We pass our module as a PATH rather than using core's suites with --group.
    # Core's suites glob ../modules/*/**/tests/src/*, which loads EVERY contrib
    # module's tests — and --group filters what runs, not what gets loaded. So
    # drupal/key's functional tests get parsed and die on a Drush test trait we do
    # not install. A path only loads ours; it still finds the submodule's kernel
    # tests, since PHPUnit recurses.
    #
    # Kernel tests need a real database. Core's config reads SIMPLETEST_DB from the
    # environment — that is what our deleted phpunit.xml.dist used to declare, and
    # without it every kernel test errors with "There is no database connection so
    # no tests can be run". SQLite is enough and needs no service container.
    #
    # BROWSERTEST_OUTPUT_DIRECTORY silences a warning about an unwritable HTML
    # output dir; nothing here is a browser test, but core checks for it anyway.
    - name: Run PHPUnit
      working-directory: ${{ env.DRUPAL_DIR }}
      env:
        SIMPLETEST_DB: sqlite://localhost/sites/default/files/.phpunit.sqlite
        BROWSERTEST_OUTPUT_DIRECTORY: /tmp/drupal/web/sites/simpletest/browser_output
      run: |
        mkdir -p web/sites/simpletest/browser_output web/sites/default/files
        ./vendor/bin/phpunit \
          -c web/core \
          --log-junit "$GITHUB_WORKSPACE/junit.xml" \
          --testdox \
          "web/modules/contrib/$MODULE"

    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        check_name: PHPUnit results PHP ${{ matrix.php }}
        files: junit.xml
        comment_mode: always
